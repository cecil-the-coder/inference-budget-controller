apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: inference-chat-ui
  namespace: inference
  labels:
    app.kubernetes.io/name: inference-budget-controller
    app.kubernetes.io/component: chat-ui
spec:
  hostnames:
    - chat.whydontyou.work
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway-system
      sectionName: http
  rules:
    - backendRefs:
        - name: inference-proxy
          port: 80
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: X-Content-Type-Options
                value: nosniff
              - name: X-Frame-Options
                value: DENY
