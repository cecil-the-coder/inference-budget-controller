apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: inference-chat-ui
  namespace: inference
  labels:
    app.kubernetes.io/name: inference-budget-controller
    app.kubernetes.io/component: chat-ui
spec:
  hostnames:
    - chat.whydontyou.work
  parentRefs:
    - name: external-gateway
      namespace: kube-system
      sectionName: https-domain1
    - name: external-gateway
      namespace: kube-system
      sectionName: http-domain1
  rules:
    - backendRefs:
        - name: controller-manager
          port: 9000
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: X-Content-Type-Options
                value: nosniff
              - name: X-Frame-Options
                value: DENY
