apiVersion: v1
kind: Service
metadata:
  name: inference-proxy
  namespace: inference
  labels:
    app.kubernetes.io/name: inference-budget-controller
    app.kubernetes.io/component: proxy
spec:
  type: ClusterIP
  selector:
    control-plane: controller-manager
  ports:
    - name: proxy
      port: 80
      targetPort: 9000
      protocol: TCP
    - name: metrics
      port: 8080
      targetPort: 8080
      protocol: TCP
